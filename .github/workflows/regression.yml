name: Run API testing FOF

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pages: write

jobs:
  regression-test:
    runs-on: ubuntu-latest
    environment: prod
    
    env:
      ENV: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          CI: true
          HOST: ${{ vars.HOST }}
        run: npm run prod
      
      - name: Upload Playwright report as Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v4
        with:
          path: playwright-report
          name: github-pages
          retention-days: 1
    
  deploy-pages:
      needs: regression-test
      runs-on: ubuntu-latest
      permissions:
        pages: write
        id-token: write
      steps:
        - name: Deploy report to GitHub Pages
          uses: actions/deploy-pages@v4